# Netlify build + hosting config.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: every path serves index.html so the client router (and its own
# 404 view) handles unknown paths. Query-param routes need no special handling.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ffmpeg.wasm needs cross-origin isolation (SharedArrayBuffer) for media
# conversion — production MUST send the same two headers the Vite dev/preview
# server sets. `credentialless` COEP keeps isolation while still allowing
# cross-origin resources (fonts, etc.) without requiring CORP on them.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "credentialless"

# Long-cache the fingerprinted build assets (Vite hashes them).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
